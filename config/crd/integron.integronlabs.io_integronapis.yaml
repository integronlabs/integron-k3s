apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: integronapis.integron.integronlabs.io
spec:
  group: integron.integronlabs.io
  names:
    kind: IntegronAPI
    listKind: IntegronAPIList
    plural: integronapis
    singular: integronapi
    shortNames:
      - iapi
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: IntegronAPI is a no-code REST API defined entirely by an OpenAPI document.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                openapi:
                  type: string
                  description: Inline OpenAPI 3 document (YAML or JSON) with x-integron-steps.
                openapiConfigMapRef:
                  type: object
                  description: Reference to an existing ConfigMap holding the spec.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                      default: openapi.yaml
                basePath:
                  type: string
                  description: >-
                    Mount the whole API under this path prefix (e.g. /dogfacts)
                    so many APIs can share one Ingress host. The operator injects
                    a matching relative servers entry into the OpenAPI document.
                image:
                  type: string
                  default: ghcr.io/integronlabs/integron-k3s/engine:latest
                imagePullPolicy:
                  type: string
                  default: IfNotPresent
                  enum: [Always, IfNotPresent, Never]
                replicas:
                  type: integer
                  format: int32
                  default: 1
                  minimum: 0
                ingress:
                  type: object
                  required:
                    - host
                  properties:
                    host:
                      type: string
                    path:
                      type: string
                      default: /
                    pathType:
                      type: string
                      default: Prefix
                    className:
                      type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                readyReplicas:
                  type: integer
                  format: int32
                url:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
