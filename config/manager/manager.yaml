apiVersion: v1
kind: Namespace
metadata:
  name: integron-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: integron-operator
  namespace: integron-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integron-operator
  namespace: integron-system
  labels:
    app.kubernetes.io/name: integron-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: integron-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: integron-operator
    spec:
      serviceAccountName: integron-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/integronlabs/integron-k3s/operator:latest
          # IfNotPresent so locally-built images imported via `make k3s-import`
          # are used instead of being re-pulled from the registry (the :latest
          # tag would otherwise default to Always).
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
